<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>취재시작 | 제보부터 해결까지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Header (상단바) -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-2xl font-black text-blue-600">취재시작</span>
            <nav class="hidden md:flex space-x-6 text-sm font-bold text-gray-600">
                <a href="#process" class="hover:text-blue-600">진행 과정</a>
                <a href="#report-form" class="hover:text-blue-600">익명 제보하기</a>
            </nav>
        </div>
    </header>

    <!-- 프로세스 안내 섹션 (4단계) -->
    <section id="process" class="py-16 max-w-5xl mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-12">제보 후, 이렇게 해결됩니다</h2>
        <div class="grid md:grid-cols-4 gap-6">
            <!-- 1단계 -->
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm relative">
                <div class="text-blue-600 font-bold mb-2">STEP 1</div>
                <h4 class="font-bold mb-2">AI 제보 분석</h4>
                <p class="text-sm text-gray-600">내용 분석 및 증거 검토 후 카테고리 분류</p>
            </div>
            <!-- 2단계 -->
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <div class="text-blue-600 font-bold mb-2">STEP 2</div>
                <h4 class="font-bold mb-2">전문가 매칭</h4>
                <p class="text-sm text-gray-600">탐사 기자(취재) 및 변호사(신고 대리) 연결</p>
            </div>
            <!-- 3단계 -->
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <div class="text-blue-600 font-bold mb-2">STEP 3</div>
                <h4 class="font-bold mb-2">공식 접수</h4>
                <p class="text-sm text-gray-600">지자체 민원 및 권익위 공익신고 공식 전달</p>
            </div>
            <!-- 4단계 -->
            <div class="bg-blue-600 text-white p-6 rounded-xl shadow-lg">
                <div class="text-blue-100 font-bold mb-2">STEP 4</div>
                <h4 class="font-bold mb-2">처리 압박 및 결과</h4>
                <p class="text-sm">의원실 질의 및 보도를 통한 빠른 처리 촉구</p>
            </div>
        </div>
    </section>

    <!-- 제보 폼 -->
    <section id="report-form" class="py-16 max-w-xl mx-auto px-4">
        <div class="bg-white p-8 rounded-2xl border border-gray-200 shadow-xl">
            <h2 class="text-2xl font-bold mb-6 text-center">불편사항 익명 제보</h2>
            <form onsubmit="handleSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">제보 유형</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="border p-3 rounded-lg text-center cursor-pointer hover:border-blue-500">
                            <input type="radio" name="type" value="civil" checked class="hidden"> 행정 민원
                        </label>
                        <label class="border p-3 rounded-lg text-center cursor-pointer hover:border-blue-500">
                            <input type="radio" name="type" value="reward" class="hidden"> 공익신고(보상금)
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold">제보 제목</label>
                    <input type="text" required class="w-full p-3 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold">사연 및 증거 현황</label>
                    <textarea required rows="4" class="w-full p-3 border rounded-lg"></textarea>
                </div>
                <button class="w-full bg-gray-900 text-white py-4 rounded-lg font-bold">제보하기</button>
            </form>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-500 text-xs">
        <p>© 2026 취재시작. 모든 제보는 암호화되어 안전하게 처리됩니다.</p>
    </footer>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            alert('제보가 성공적으로 접수되었습니다! \n\n[단계별 진행 안내]\n1. AI가 제보 내용을 분석합니다.\n2. 매칭된 기자가 사실 확인 후 추가 취재에 돌입합니다.\n3. 지자체 및 권익위에 공식 접수합니다.\n4. 담당 국회의원/시의원실에 민원 해결을 촉구합니다.\n\n진행 상황은 MY 페이지에서 실시간 확인 가능합니다.');
        }
    </script>
</body>
</html>
