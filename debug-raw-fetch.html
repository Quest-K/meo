<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진단 페이지</title>
<style>
  body{font-family:sans-serif; padding:20px; font-size:14px; line-height:1.6;}
  button{padding:14px 20px; font-size:15px; margin:10px 0; width:100%;}
  pre{background:#f0f0f0; padding:12px; white-space:pre-wrap; word-break:break-all; border:1px solid #ccc;}
</style>
</head>
<body>
<h2>Supabase REST 직접 호출 테스트</h2>
<p>supabase-js 라이브러리 없이, 순수 fetch로 users 테이블에 insert를 직접 시도합니다.</p>

<button id="testBtn">테스트 실행</button>
<pre id="result">결과가 여기에 표시됩니다.</pre>

<script>
const SUPABASE_URL = "https://kpooxiwiqkcizhtdleor.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtwb294aXdpcWtjaXpodGRsZW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjA2MTEsImV4cCI6MjA5OTE5NjYxMX0.4aBRHVw2OK9mfX78zbfSyxqKRcYnvejCGH22MyrVTA8";

document.getElementById('testBtn').addEventListener('click', async ()=>{
  const resultEl = document.getElementById('result');
  resultEl.textContent = '요청 중...';

  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
      method: 'POST',
      headers: {
        'apikey': ANON_KEY,
        'Authorization': 'Bearer ' + ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        name: '순수fetch테스트',
        phone: '01099998888',
        email: 'purefetch@test.com'
      })
    });

    const text = await res.text();
    resultEl.textContent = 'HTTP 상태: ' + res.status + '\n\n응답 내용:\n' + (text || '(빈 응답 - 성공 시 정상)');
  }catch(err){
    resultEl.textContent = '네트워크 에러: ' + err.message;
  }
});
</script>
</body>
</html>
