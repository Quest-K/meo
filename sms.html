<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온기(On-Gi) | 피싱 생존율 테스트</title>
<style>
  :root{
    --bg:#FDFBF7;
    --card:#FFFFFF;
    --ink:#4A3E3D;
    --ink-soft:#8A7E7C;
    --line:#EAE5DC;
    --chat:#F4F1EA;
    --accent:#C08C73;
    --accent-deep:#A9714F;
    --danger:#E0654F;
    --safe:#5B8C72;
    --warn:#D7A23A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:24px 0;
  }
  .container{
    width:100%;
    max-width:420px;
    background:var(--card);
    padding:40px 24px;
    box-shadow:0 10px 30px rgba(74,62,61,.06);
    border-radius:24px;
    text-align:center;
    box-sizing:border-box;
    position:relative;
  }
  .brand-name{
    font-size:13px;
    color:var(--accent-deep);
    font-weight:700;
    letter-spacing:2.5px;
    margin-bottom:8px;
  }
  h1{
    font-size:25px;
    font-weight:700;
    line-height:1.4;
    margin:0 0 16px 0;
  }
  .desc{
    font-size:14.5px;
    color:var(--ink-soft);
    line-height:1.65;
    margin-bottom:32px;
  }

  /* 진행도 */
  .progress-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:28px;
  }
  .progress-track{
    flex:1;
    height:6px;
    background:var(--line);
    border-radius:99px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent-deep));
    border-radius:99px;
    transition:width .35s ease;
  }
  .progress-label{
    font-size:12px;
    color:var(--ink-soft);
    font-weight:600;
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }

  .qtag{
    font-size:12.5px;
    color:var(--accent-deep);
    font-weight:700;
    letter-spacing:.5px;
    margin-bottom:10px;
  }
  .qtitle{
    font-size:22px;
    font-weight:700;
    line-height:1.45;
    margin:0 0 22px 0;
    text-align:left;
  }

  /* 메시지 시뮬레이션 */
  .chat-box{
    background:var(--chat);
    border-radius:16px;
    padding:16px;
    text-align:left;
    margin-bottom:22px;
    font-size:14px;
    line-height:1.55;
    box-shadow:inset 0 2px 5px rgba(0,0,0,.03);
    position:relative;
  }
  .chat-tag{
    font-size:11px;
    color:var(--danger);
    font-weight:700;
    margin-bottom:6px;
    letter-spacing:.3px;
  }
  .chat-link{
    color:#2980B9;
    text-decoration:underline;
    word-break:break-all;
  }
  .chat-meta{
    margin-top:8px;
    font-size:11px;
    color:var(--ink-soft);
  }
  .call-box{
    background:var(--chat);
    border-radius:16px;
    padding:18px 16px;
    text-align:left;
    margin-bottom:22px;
    font-size:14px;
    line-height:1.6;
  }
  .call-box .num{
    font-weight:700;
    color:var(--ink);
  }

  /* 선택지 */
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .btn{
    background:var(--ink);
    color:#fff;
    border:none;
    padding:16px 18px;
    font-size:15px;
    font-weight:600;
    border-radius:12px;
    cursor:pointer;
    width:100%;
    transition:background .2s, transform .1s;
    text-align:left;
    line-height:1.45;
  }
  .btn:hover{ background:#635352; }
  .btn:active{ transform:scale(.98); }
  .btn-select{
    background:#FFFFFF;
    color:var(--ink);
    border:2px solid var(--line);
  }
  .btn-select:hover{
    background:var(--bg);
    border-color:var(--accent);
  }
  .btn-primary{
    background:var(--ink);
    color:#fff;
    border:none;
    text-align:center;
  }
  .btn:focus-visible, .btn-select:focus-visible{
    outline:3px solid var(--accent);
    outline-offset:2px;
  }

  .hidden{ display:none; }

  /* 결과 페이지 */
  .ring-wrap{
    position:relative;
    width:170px;
    height:170px;
    margin:8px auto 18px auto;
  }
  .ring-label{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .ring-percent{
    font-size:38px;
    font-weight:800;
    line-height:1;
  }
  .ring-percent-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
    font-weight:600;
  }
  .grade-chip{
    display:inline-block;
    padding:6px 14px;
    border-radius:99px;
    font-size:13px;
    font-weight:700;
    margin-bottom:18px;
    letter-spacing:.3px;
  }
  .result-msg{
    font-size:14.5px;
    color:var(--ink-soft);
    line-height:1.7;
    margin-bottom:24px;
    text-align:left;
  }
  .review-list{
    text-align:left;
    margin-bottom:24px;
    border-top:1px solid var(--line);
  }
  .review-item{
    padding:14px 0;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:10px;
    align-items:flex-start;
  }
  .review-mark{
    flex-shrink:0;
    width:22px;
    height:22px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:800;
    color:#fff;
    margin-top:1px;
  }
  .mark-good{ background:var(--safe); }
  .mark-bad{ background:var(--danger); }
  .review-text{
    font-size:13.5px;
    line-height:1.55;
    color:var(--ink);
  }
  .review-q{
    font-size:11.5px;
    color:var(--ink-soft);
    font-weight:600;
    margin-bottom:2px;
  }

  .share-row{
    display:flex;
    gap:10px;
    margin-bottom:12px;
  }
  .share-row .btn-select{
    flex:1;
  }
</style>
</head>
<body>

<!-- 1. 홈 화면 -->
<div id="start-page" class="container">
  <div class="brand-name">디지털 소도어스 : 온기</div>
  <h1>나와 우리 부모님의<br>피싱 생존율 테스트</h1>
  <p class="desc">더 교묘해진 디지털 범죄 세상,<br>과연 당신은 피싱으로부터 안전할까요?<br>실제 신고 사례를 바탕으로 재구성한<br>5가지 상황으로 테스트해 보세요.</p>
  <button class="btn" onclick="startTest()">테스트 시작하기</button>
  <p style="font-size:11.5px;color:var(--ink-soft);margin-top:14px;line-height:1.6;">
    ※ 등장하는 기관명·번호·링크는 모두 가상이며,<br>실제 신고된 범죄 수법의 패턴만을 교육 목적으로 재구성했습니다.
  </p>
</div>

<!-- 2. 문제 화면 -->
<div id="question-page" class="container hidden">
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">1 / 5</div>
  </div>
  <div id="question-content"></div>
</div>

<!-- 3. 결과 화면 -->
<div id="result-page" class="container hidden">
  <div class="brand-name">테스트 결과</div>
  <div class="ring-wrap">
    <svg width="170" height="170" viewBox="0 0 170 170">
      <circle cx="85" cy="85" r="74" fill="none" stroke="#EAE5DC" stroke-width="14"/>
      <circle id="ring-fg" cx="85" cy="85" r="74" fill="none" stroke="#C08C73" stroke-width="14"
        stroke-linecap="round" stroke-dasharray="465" stroke-dashoffset="465"
        transform="rotate(-90 85 85)" style="transition:stroke-dashoffset 1s ease;"/>
    </svg>
    <div class="ring-label">
      <div class="ring-percent" id="ring-percent">0%</div>
      <div class="ring-percent-sub">예상 생존율</div>
    </div>
  </div>
  <div id="grade-chip" class="grade-chip">분석 중</div>
  <h1 id="result-title" style="font-size:21px;"></h1>
  <p class="result-msg" id="result-msg"></p>

  <div class="review-list" id="review-list"></div>

  <button class="btn btn-primary" onclick="restartTest()">다시 테스트하기</button>
  <p style="font-size:11.5px;color:var(--ink-soft);margin-top:14px;line-height:1.6;">
    부모님께도 이 테스트를 보내보세요.<br>가족의 디지털 안전, 온기에서 함께 지킵니다.
  </p>
</div>

<script>
/* ───────────────────────────────
   문항 데이터
   type: 'sms' | 'call'
   options[].score: 1(안전) ~ 0(위험)
   options[].feedback: 결과 리뷰에 쓰일 한 줄 코멘트
─────────────────────────────── */
const QUESTIONS = [
  {
    tag: 'Q1. 공공기관 사칭',
    title: '이런 문자가 온다면<br>어떻게 하시겠습니까?',
    type: 'sms',
    sender: '[국민안심보험]',
    body: '일반 검진 대상자 통보서 발송 완료. 미수령 확인 및 상세 내용 조회는 아래 주소에서 확인해 주세요.',
    link: 'gukmin-health.co.kr.info-detail.net/g/3820',
    options: [
      { text: '"내가 검진 대상자였나?" 하고 링크를 눌러본다.', score: 0,
        feedback: '공식 도메인이 아닌 변형 주소(...co.kr.info-detail.net)는 가장 흔한 위장 패턴이에요.' },
      { text: '문자를 무시하고 기관 공식 대표번호로 직접 전화해 확인한다.', score: 1,
        feedback: '문자 속 링크·번호 대신 공식 대표번호로 직접 확인하는 것이 가장 안전한 방법이에요.' },
      { text: '의심스럽지만 일단 캡처해두고 가족에게 물어본다.', score: 0.6,
        feedback: '클릭하지 않은 점은 좋아요. 다만 확인은 공식 채널을 통해 하는 습관을 들여보세요.' },
    ]
  },
  {
    tag: 'Q2. 택배 배송 사칭',
    title: '배송 조회를 위해<br>이 링크를 누르시겠습니까?',
    type: 'sms',
    sender: '[늘빠른택배]',
    body: '고객님 주소 오류로 배송이 보류되었습니다. 24시간 내 미수정시 반송 처리됩니다.',
    link: 'nulbbareun-delivery.cn/track?id=29381',
    options: [
      { text: '주소 오류라니 급한 마음에 바로 링크를 눌러 수정한다.', score: 0,
        feedback: '".cn" 등 낯선 국가 도메인과 "24시간 내" 같은 압박 문구는 전형적인 스미싱 신호예요.' },
      { text: '주문한 적 없는 택배면 무시하고, 실제 주문 내역을 앱에서 직접 확인한다.', score: 1,
        feedback: '문자 속 링크 대신 본인이 직접 설치한 앱·사이트에서 확인하는 습관이 중요해요.' },
      { text: '택배사에 전화해보는데, 문자에 적힌 번호로 건다.', score: 0.3,
        feedback: '확인 시도는 좋지만, 문자에 적힌 번호 자체가 가짜일 수 있어요. 검색을 통해 공식 번호를 찾아야 해요.' },
    ]
  },
  {
    tag: 'Q3. 금융기관 사칭',
    title: '이런 전화를 받는다면<br>어떻게 대응하시겠습니까?',
    type: 'call',
    callerLabel: '발신: 010-2xxx-9981 (저장되지 않은 번호)',
    callBody: '"안심카드 보안팀입니다. 고객님 명의로 해외에서 350만원 결제가 시도되어 차단했습니다. 본인 확인을 위해 카드 뒷면 번호와 비밀번호 앞 2자리를 말씀해주세요."',
    options: [
      { text: '해외 결제라니 놀라서 빠르게 정보를 알려준다.', score: 0,
        feedback: '어떤 금융기관도 전화로 카드 번호 전체나 비밀번호를 묻지 않아요. 이는 100% 보이스피싱 패턴이에요.' },
      { text: '일단 끊고, 카드 뒷면에 적힌 고객센터 번호로 직접 전화한다.', score: 1,
        feedback: '전화를 끊고 공식 번호로 재발신하는 것이 보이스피싱을 막는 핵심 행동이에요.' },
      { text: '의심되어 "그럼 어디 소속이냐"고 캐묻다가 정보 일부를 흘린다.', score: 0.2,
        feedback: '의심한 것은 좋지만, 대화를 이어갈수록 설계된 각본에 끌려갈 위험이 커져요. 바로 끊는 것이 정답이에요.' },
    ]
  },
  {
    tag: 'Q4. 지인 사칭(메신저)',
    title: '딸이 보낸 듯한 메시지,<br>바로 도와주시겠습니까?',
    type: 'sms',
    sender: '카카오톡 · 딸 (프로필 사진 동일)',
    body: '엄마 나 폰 액정 깨져서 수리맡기고 친구폰으로 보내는거야ㅠ 급한데 80만원만 이 계좌로 보내줄 수 있어? 나중에 갚을게',
    link: null,
    options: [
      { text: '딸이 급하다니 일단 계좌로 돈을 보낸다.', score: 0,
        feedback: '프로필 사진까지 도용하는 메신저 피싱이 늘고 있어요. "급하다"는 압박이 있을수록 더 의심해야 해요.' },
      { text: '메시지로 답하지 않고, 평소 알던 딸의 전화번호로 직접 전화를 건다.', score: 1,
        feedback: '같은 메신저 안에서 확인하지 않고 다른 채널(전화)로 본인 확인을 하는 것이 핵심이에요.' },
      { text: '"무슨 일 있었어?" 같은 질문을 채팅으로 몇 개 던져보고 판단한다.', score: 0.4,
        feedback: '대화만으로는 진위를 알기 어려워요. 가족만 아는 질문보다 직접 통화 확인이 훨씬 안전해요.' },
    ]
  },
  {
    tag: 'Q5. 앱 설치 유도형',
    title: '안내된 앱을 설치해서<br>본인 인증을 진행하시겠습니까?',
    type: 'sms',
    sender: '[정부민원24]',
    body: '미환급금 1건이 조회되었습니다. 본인 인증 후 환급 신청을 위해 전용 앱 설치가 필요합니다.',
    link: 'gov24-refund-app.net/install.apk',
    options: [
      { text: '환급금을 받기 위해 안내된 앱(.apk)을 설치하고 인증을 진행한다.', score: 0,
        feedback: '공식 앱스토어가 아닌 출처에서 .apk 파일을 직접 설치하도록 유도하는 것은 악성 앱 설치 시도의 전형적인 방식이에요.' },
      { text: '의심스러워서 설치하지 않고, 실제 정부 공식 사이트에서 환급금을 직접 조회한다.', score: 1,
        feedback: '환급금 조회는 공식 앱스토어의 정식 앱이나 공식 홈페이지에서만 진행하는 것이 안전해요.' },
      { text: '앱은 설치하지만 의심스러운 권한 요청이 뜨면 그때 취소한다.', score: 0.3,
        feedback: '설치 단계에서 이미 악성 코드가 실행될 수 있어요. 설치 전에 출처를 의심하는 것이 먼저예요.' },
    ]
  }
];

let currentIndex = 0;
let answers = []; // {score, feedback, qtag}

function startTest(){
  document.getElementById('start-page').classList.add('hidden');
  document.getElementById('question-page').classList.remove('hidden');
  currentIndex = 0;
  answers = [];
  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[currentIndex];
  const total = QUESTIONS.length;

  document.getElementById('progress-fill').style.width = ((currentIndex)/total*100) + '%';
  document.getElementById('progress-label').textContent = (currentIndex+1) + ' / ' + total;

  let mediaHtml = '';
  if(q.type === 'sms'){
    mediaHtml = `
      <div class="chat-box">
        <div class="chat-tag">${q.sender}</div>
        ${q.body}${q.link ? `<br><span class="chat-link">${q.link}</span>` : ''}
        <div class="chat-meta">방금 전 · 알 수 없는 발신 번호</div>
      </div>`;
  } else if(q.type === 'call'){
    mediaHtml = `
      <div class="call-box">
        <div class="num">📞 ${q.callerLabel}</div>
        <div style="margin-top:10px;">${q.callBody}</div>
      </div>`;
  }

  const optionsHtml = q.options.map((opt, i) =>
    `<button class="btn btn-select" onclick="selectOption(${i})">${opt.text}</button>`
  ).join('');

  document.getElementById('question-content').innerHTML = `
    <div class="qtag">${q.tag}</div>
    <h1 class="qtitle">${q.title}</h1>
    ${mediaHtml}
    <div class="options">${optionsHtml}</div>
  `;
}

function selectOption(i){
  const q = QUESTIONS[currentIndex];
  const opt = q.options[i];
  answers.push({ qtag: q.tag, score: opt.score, feedback: opt.feedback });

  if(currentIndex < QUESTIONS.length - 1){
    currentIndex++;
    renderQuestion();
  } else {
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-label').textContent = QUESTIONS.length + ' / ' + QUESTIONS.length;
    setTimeout(showResult, 250);
  }
}

function showResult(){
  document.getElementById('question-page').classList.add('hidden');
  document.getElementById('result-page').classList.remove('hidden');

  const totalScore = answers.reduce((s,a)=>s+a.score,0);
  const maxScore = QUESTIONS.length;
  const percent = Math.round((totalScore/maxScore)*100);

  // 등급 산정
  let grade, gradeColor, title, msg;
  if(percent >= 90){
    grade = '베테랑'; gradeColor = '#5B8C72';
    title = '거의 모든 함정을 피했어요';
    msg = '의심스러운 연락에 반응하기 전, 항상 공식 채널로 재확인하는 습관이 잘 잡혀 있어요. 다만 피싱 수법은 계속 진화하니 가족에게도 이 테스트를 공유해보세요.';
  } else if(percent >= 70){
    grade = '안전 우위'; gradeColor = '#7A9E7E';
    title = '대체로 안전하게 대응했어요';
    msg = '핵심 상황에서는 잘 대응했지만, 한두 가지 패턴에서 흔들렸어요. 아래 리뷰에서 어떤 부분을 보완하면 좋을지 확인해보세요.';
  } else if(percent >= 40){
    grade = '주의 필요'; gradeColor = '#D7A23A';
    title = '몇 가지 함정에 걸릴 수 있어요';
    msg = '급하거나 그럴듯한 상황일수록 판단이 흐려지기 쉬워요. "링크를 누르기 전 공식 채널로 확인" 한 가지 원칙만 기억해도 위험을 크게 줄일 수 있어요.';
  } else {
    grade = '고위험'; gradeColor = '#E0654F';
    title = '지금 바로 점검이 필요해요';
    msg = '여러 상황에서 피싱 신호를 놓쳤어요. 부끄러운 일이 아니에요 — 요즘 수법은 매우 정교해졌거든요. 아래 리뷰를 가족과 함께 읽어보는 것을 추천해요.';
  }

  document.getElementById('ring-percent').textContent = percent + '%';
  const circumference = 465; // 2 * π * 74
  const offset = circumference - (circumference * percent / 100);
  const ring = document.getElementById('ring-fg');
  ring.style.stroke = gradeColor;
  setTimeout(()=>{ ring.style.strokeDashoffset = offset; }, 80);

  const chip = document.getElementById('grade-chip');
  chip.textContent = grade + ' 등급';
  chip.style.background = gradeColor + '22';
  chip.style.color = gradeColor;

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;

  const reviewHtml = answers.map(a => {
    const isGood = a.score >= 0.7;
    return `
      <div class="review-item">
        <div class="review-mark ${isGood ? 'mark-good' : 'mark-bad'}">${isGood ? '✓' : '!'}</div>
        <div class="review-text">
          <div class="review-q">${a.qtag}</div>
          ${a.feedback}
        </div>
      </div>`;
  }).join('');
  document.getElementById('review-list').innerHTML = reviewHtml;
}

function restartTest(){
  document.getElementById('result-page').classList.add('hidden');
  document.getElementById('start-page').classList.remove('hidden');
  document.getElementById('ring-fg').style.strokeDashoffset = 465;
}
</script>
</body>
</html>
