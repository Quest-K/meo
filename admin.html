<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 취재시작</title>
<link rel="stylesheet" href="style.css">
<style>
  .tabs{display:flex; gap:8px; margin-bottom:20px;}
  .tab-btn{
    font-family:'IBM Plex Mono',monospace; font-size:13px; padding:9px 16px;
    border:1.5px solid var(--ink); background:transparent; cursor:pointer;
  }
  .tab-btn.active{background:var(--ink); color:var(--paper);}
  .panel{display:none;}
  .panel.show{display:block;}
  select.status-select{width:auto; padding:6px 8px; font-size:12px;}
  .row-actions{display:flex; gap:6px;}
  .row-actions button{font-size:12px; padding:6px 10px;}
  .detail-row td{background:#F7F4EC; padding:16px; font-size:13px;}
  .detail-grid{display:grid; grid-template-columns:1fr; gap:10px;}
  .detail-grid .label{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); text-transform:uppercase;}
  .detail-grid .value{margin-bottom:8px; white-space:pre-wrap;}
  .overdue{color:var(--stamp); font-weight:700;}
</style>
</head>
<body>

<header class="case-header">
  <div class="brand">취재시작 · 관리자</div>
  <nav>
    <a href="#" id="logoutLink" style="display:none;">로그아웃</a>
  </nav>
</header>

<main class="wrap" style="padding-top:32px;">

  <section id="loginSection">
    <div class="eyebrow">관리자 로그인</div>
    <h2 style="font-size:22px;">관리자 로그인</h2>
    <div class="form-card">
      <div id="loginMsg" class="msg"></div>
      <form id="loginForm">
        <div class="field">
          <label for="email">이메일</label>
          <input type="email" id="email" required>
        </div>
        <div class="field">
          <label for="password">비밀번호</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn primary block">로그인</button>
      </form>
    </div>
  </section>

  <section id="dashboardSection" style="display:none;">
    <div class="tabs">
      <button class="tab-btn active" data-panel="reportsPanel">민원 관리</button>
      <button class="tab-btn" data-panel="partnersPanel">파트너 승인</button>
      <button class="tab-btn" data-panel="activityPanel">파트너 활동</button>
      <button class="tab-btn" data-panel="settlementsPanel">정산 관리</button>
    </div>

    <div id="reportsPanel" class="panel show">
      <table>
        <thead>
          <tr><th>ID</th><th>제목</th><th>요금제</th><th>상태</th><th>접수일</th><th>경과일</th><th>배정</th><th></th></tr>
        </thead>
        <tbody id="reportsBody"></tbody>
      </table>
    </div>

    <div id="partnersPanel" class="panel">
      <table>
        <thead>
          <tr><th>이름</th><th>유형</th><th>연락처</th><th>상태</th><th>배정</th><th>승인</th></tr>
        </thead>
        <tbody id="partnersBody"></tbody>
      </table>
    </div>

    <div id="activityPanel" class="panel">
      <table>
        <thead>
          <tr><th>일시</th><th>파트너</th><th>사건</th><th>활동</th></tr>
        </thead>
        <tbody id="activityBody"></tbody>
      </table>
    </div>

    <div id="settlementsPanel" class="panel">
      <div id="settlementSummary" style="margin-bottom:16px; font-family:'IBM Plex Mono',monospace; font-size:13px;"></div>
      <table>
        <thead>
          <tr><th>사건</th><th>파트너</th><th>요금제</th><th>결제금액</th><th>파트너지급</th><th>플랫폼수익</th><th>완료</th></tr>
        </thead>
        <tbody id="settlementsBody"></tbody>
      </table>
    </div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="document.getElementById('initError').style.display='block'; document.getElementById('initError').textContent='Supabase 라이브러리(CDN) 로드에 실패했습니다. 네트워크/광고차단 확장 프로그램을 확인해주세요.';"></script>
<div id="initError" style="display:none; background:#F6E5E2; color:#832920; padding:14px; margin:20px; font-size:13px;"></div>
<script src="supabase-client-admin.js"></script>
<script>
if(typeof window.supabase === 'undefined'){
  document.getElementById('initError').style.display='block';
  document.getElementById('initError').textContent='Supabase 라이브러리가 로드되지 않았습니다. 페이지를 새로고침하거나 다른 네트워크에서 시도해주세요.';
  throw new Error('supabase-js failed to load');
}
const STATUS_OPTIONS = ['RECEIPT','ANALYSIS','SUBMISSION','PRESSURE','RESOLVED'];
const STATUS_LABELS = { RECEIPT:'접수', ANALYSIS:'분석·배정', SUBMISSION:'접수·대행', PRESSURE:'압박·공론화', RESOLVED:'해결' };

function showMsg(el, text, type){
  el.textContent = text;
  el.className = 'msg show ' + type;
}

async function checkSession(){
  const { data: { session } } = await supabaseClient.auth.getSession();
  if(session){
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
    document.getElementById('logoutLink').style.display = 'inline';
    loadReports();
    loadPartners();
    loadActivity();
    loadSettlements();
  }
}

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const msgEl = document.getElementById('loginMsg');
  try{
    const { error } = await supabaseClient.auth.signInWithPassword({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });
    if(error){
      showMsg(msgEl, '로그인 실패: ' + error.message, 'error');
      return;
    }
    checkSession();
  }catch(err){
    showMsg(msgEl, '예상치 못한 오류: ' + err.message, 'error');
  }
});

document.getElementById('logoutLink').addEventListener('click', async (e)=>{
  e.preventDefault();
  await supabaseClient.auth.signOut();
  location.reload();
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.panel).classList.add('show');
  });
});

let approvedPartners = [];

async function loadReports(){
  const body = document.getElementById('reportsBody');

  const { data, error } = await supabaseClient
    .from('reports')
    .select('id,title,content,plan_type,status,created_at,user_id,has_existing_civil,civil_receipt_number,gov_platform_name,gov_department,civil_receipt_date,assigned_officer,officer_contact,gov_latest_response,assigned_partner_id,category,ai_report_content,region_sido,region_detail,region_na')
    .order('created_at', { ascending:false });

  if(error){ body.innerHTML = `<tr><td colspan="8">불러오기 실패: ${error.message}</td></tr>`; return; }

  // 연락처 정보를 위해 관련 유저 정보 별도 조회 후 매칭
  const userIds = [...new Set(data.map(r => r.user_id).filter(Boolean))];
  let usersById = {};
  if(userIds.length){
    const { data: users } = await supabaseClient
      .from('users')
      .select('id,name,phone,email')
      .in('id', userIds);
    (users || []).forEach(u => usersById[u.id] = u);
  }

  // 배정 가능한(승인된) 파트너 목록
  const { data: partners } = await supabaseClient
    .from('partners')
    .select('id,name,specialty')
    .eq('status','approved');
  approvedPartners = partners || [];

  // 동일 연락처 기준 중복 접수 탐지: phone -> [report id...]
  const phoneToReportIds = {};
  data.forEach(r => {
    const phone = usersById[r.user_id]?.phone;
    if(!phone) return;
    if(!phoneToReportIds[phone]) phoneToReportIds[phone] = [];
    phoneToReportIds[phone].push(r.id);
  });

  body.innerHTML = data.map(r => {
    const u = usersById[r.user_id] || {};
    const dupIds = (phoneToReportIds[u.phone] || []).filter(id => id !== r.id);
    const daysElapsed = Math.floor((Date.now() - new Date(r.created_at).getTime()) / 86400000);
    const isOverdue = r.status === 'SUBMISSION' && daysElapsed >= 7;
    return `
    <tr>
      <td>${r.id}</td>
      <td>${r.title} ${r.category ? `<span class="badge ANALYSIS">${r.category}</span>` : ''} ${dupIds.length ? `<span class="badge pending">중복?</span>` : ''}<br><span style="font-size:11px;color:var(--ink-soft);">${r.region_na ? '지역무관' : (r.region_sido||'')+' '+(r.region_detail||'')}</span></td>
      <td>${r.plan_type || '-'}</td>
      <td>
        <select class="status-select" data-id="${r.id}">
          ${STATUS_OPTIONS.map(s=>`<option value="${s}" ${s===r.status?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
        </select>
      </td>
      <td>${new Date(r.created_at).toLocaleDateString('ko-KR')}</td>
      <td class="${isOverdue?'overdue':''}">${daysElapsed}일 ${isOverdue?'(기한초과)':''}</td>
      <td>
        <select class="assign-select" data-id="${r.id}">
          <option value="">미배정</option>
          ${approvedPartners.map(p=>`<option value="${p.id}" ${p.id===r.assigned_partner_id?'selected':''}>${p.name} (${p.specialty||'-'})</option>`).join('')}
        </select>
      </td>
      <td><button class="btn detail-toggle" data-target="detail-${r.id}">상세</button></td>
    </tr>
    <tr class="detail-row" id="detail-${r.id}" style="display:none;">
      <td colspan="8">
        <div class="detail-grid">
          <div><span class="label">지역</span><div class="value">${r.region_na ? '지역무관' : `${r.region_sido || '-'} ${r.region_detail || ''}`}</div></div>
          <div><span class="label">제보자</span><div class="value">${u.name || '-'} · ${u.phone || '-'} ${u.email ? '· ' + u.email : ''}</div></div>
          <div><span class="label">사연 / 민원 내용 (원본)</span><div class="value">${(r.content || '').replace(/</g,'&lt;')}</div></div>
          <div><span class="label">AI 정리본 ${r.category ? '· 카테고리: ' + r.category : ''}</span><div class="value">${r.ai_report_content ? r.ai_report_content.replace(/</g,'&lt;') : '(아직 분석 전)'}</div></div>
          <div><span class="label">기존 민원(기관) 접수 여부</span><div class="value">${r.has_existing_civil ? `있음 · 접수번호: ${r.civil_receipt_number || '-'} · 기관: ${r.gov_platform_name || '-'} · 담당부서: ${r.gov_department || '-'} · 접수일: ${r.civil_receipt_date || '-'}` : '없음(처음 접수)'}</div></div>
          <div><span class="label">동일 연락처의 다른 접수 건</span><div class="value">${dupIds.length ? '#' + dupIds.join(', #') + ' (중복 접수 가능성 확인 필요)' : '없음'}</div></div>
          <div><span class="label">담당 공무원</span><div class="value">${r.assigned_officer || '-'} ${r.officer_contact ? '· ' + r.officer_contact : ''}</div></div>
          <div><span class="label">최근 정부 응답</span><div class="value">${r.gov_latest_response || '-'}</div></div>
        </div>
      </td>
    </tr>
  `}).join('');

  document.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('change', async ()=>{
      await supabaseClient.from('reports').update({ status: sel.value }).eq('id', sel.dataset.id);
      const report = data.find(r => r.id === Number(sel.dataset.id));
      await supabaseClient.from('activity_log').insert({
        report_id: Number(sel.dataset.id),
        partner_id: report ? report.assigned_partner_id : null,
        action: `상태 변경 → ${STATUS_LABELS[sel.value] || sel.value} (#${sel.dataset.id}: ${report ? report.title : ''})`
      });
    });
  });

  document.querySelectorAll('.assign-select').forEach(sel=>{
    sel.addEventListener('change', async ()=>{
      const reportId = Number(sel.dataset.id);
      const partnerId = sel.value ? Number(sel.value) : null;
      await supabaseClient.from('reports').update({ assigned_partner_id: partnerId }).eq('id', reportId);
      if(partnerId){
        const partner = approvedPartners.find(p => p.id === partnerId);
        const report = data.find(r => r.id === reportId);
        await supabaseClient.from('activity_log').insert({
          partner_id: partnerId,
          report_id: reportId,
          action: `사건 배정 (#${reportId}: ${report ? report.title : ''})`,
          note: partner ? `담당: ${partner.name}` : null
        });
      }
    });
  });

  document.querySelectorAll('#reportsBody .detail-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const row = document.getElementById(btn.dataset.target);
      row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
    });
  });
}

async function loadActivity(){
  const body = document.getElementById('activityBody');
  const { data, error } = await supabaseClient
    .from('activity_log')
    .select('id,action,note,created_at,partner_id,report_id')
    .order('created_at', { ascending:false })
    .limit(100);

  if(error){ body.innerHTML = `<tr><td colspan="4">불러오기 실패: ${error.message}</td></tr>`; return; }

  const partnerIds = [...new Set(data.map(a => a.partner_id).filter(Boolean))];
  const reportIds = [...new Set(data.map(a => a.report_id).filter(Boolean))];

  let partnersById = {}, reportsById = {};
  if(partnerIds.length){
    const { data: p } = await supabaseClient.from('partners').select('id,name').in('id', partnerIds);
    (p||[]).forEach(x => partnersById[x.id] = x.name);
  }
  if(reportIds.length){
    const { data: r } = await supabaseClient.from('reports').select('id,title').in('id', reportIds);
    (r||[]).forEach(x => reportsById[x.id] = x.title);
  }

  body.innerHTML = data.map(a => `
    <tr>
      <td>${new Date(a.created_at).toLocaleString('ko-KR')}</td>
      <td>${partnersById[a.partner_id] || '-'}</td>
      <td>${reportsById[a.report_id] || '-'}</td>
      <td>${a.action}${a.note ? ' · ' + a.note : ''}</td>
    </tr>
  `).join('');
}

async function loadPartners(){
  const { data, error } = await supabaseClient
    .from('partners')
    .select('id,name,specialty,expertise_area,phone,status')
    .order('created_at', { ascending:false });

  const body = document.getElementById('partnersBody');
  if(error){ body.innerHTML = `<tr><td colspan="6">불러오기 실패</td></tr>`; return; }

  // 파트너별 배정 사건 목록 조회
  const partnerIds = data.map(p => p.id);
  let assignmentsByPartner = {};
  if(partnerIds.length){
    const { data: assignedReports } = await supabaseClient
      .from('reports')
      .select('id,title,status,assigned_partner_id')
      .in('assigned_partner_id', partnerIds);
    (assignedReports || []).forEach(r => {
      if(!assignmentsByPartner[r.assigned_partner_id]) assignmentsByPartner[r.assigned_partner_id] = [];
      assignmentsByPartner[r.assigned_partner_id].push(r);
    });
  }

  body.innerHTML = data.map(p => {
    const assigned = assignmentsByPartner[p.id] || [];
    return `
    <tr>
      <td>${p.name}</td>
      <td>${p.specialty || '-'}${p.expertise_area ? ' · ' + p.expertise_area : ''}</td>
      <td>${p.phone}</td>
      <td><span class="badge ${p.status}">${p.status==='approved'?'승인':'대기'}</span></td>
      <td>${assigned.length}건 ${assigned.length ? `<button class="btn detail-toggle" data-target="partner-detail-${p.id}" style="padding:4px 8px; font-size:11px;">보기</button>` : ''}</td>
      <td class="row-actions">
        ${p.status !== 'approved' ? `<button class="btn" data-approve="${p.id}">승인</button>` : ''}
      </td>
    </tr>
    ${assigned.length ? `
    <tr class="detail-row" id="partner-detail-${p.id}" style="display:none;">
      <td colspan="6">
        <div class="detail-grid">
          ${assigned.map(r => `<div class="value">#${r.id} ${r.title} — <span class="badge ${r.status}">${STATUS_LABELS[r.status]||r.status}</span></div>`).join('')}
        </div>
      </td>
    </tr>` : ''}
  `}).join('');

  document.querySelectorAll('#partnersBody .detail-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const row = document.getElementById(btn.dataset.target);
      if(row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
    });
  });

  document.querySelectorAll('[data-approve]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      await supabaseClient.from('partners').update({ status:'approved' }).eq('id', btn.dataset.approve);
      await supabaseClient.from('activity_log').insert({
        partner_id: Number(btn.dataset.approve),
        action: '파트너 승인'
      });
      loadPartners();
    });
  });
}

const PLAN_PRICES = { free:0, light:34000, standard:140000, pro:250000 };

async function loadSettlements(){
  const body = document.getElementById('settlementsBody');
  const summaryEl = document.getElementById('settlementSummary');

  // 파트너가 배정된 사건 대상
  const { data: reports, error } = await supabaseClient
    .from('reports')
    .select('id,title,plan_type,status,assigned_partner_id')
    .not('assigned_partner_id','is',null)
    .order('id', { ascending:false });

  if(error){ body.innerHTML = `<tr><td colspan="7">불러오기 실패: ${error.message}</td></tr>`; return; }

  const partnerIds = [...new Set(reports.map(r=>r.assigned_partner_id).filter(Boolean))];
  let partnersById = {};
  if(partnerIds.length){
    const { data: p } = await supabaseClient.from('partners').select('id,name').in('id', partnerIds);
    (p||[]).forEach(x => partnersById[x.id] = x.name);
  }

  const reportIds = reports.map(r=>r.id);
  let settlementsByReport = {};
  if(reportIds.length){
    const { data: s } = await supabaseClient.from('settlements').select('*').in('report_id', reportIds);
    (s||[]).forEach(x => settlementsByReport[x.report_id] = x);
  }

  let totalAmount = 0, totalPayout = 0, totalFee = 0;

  body.innerHTML = reports.map(r => {
    const s = settlementsByReport[r.id];
    const defaultAmount = s ? s.total_amount : (PLAN_PRICES[r.plan_type] || 0);
    const defaultPayout = s ? s.partner_payout : 0;
    const fee = defaultAmount - defaultPayout;
    if(s && s.paid){
      totalAmount += s.total_amount; totalPayout += s.partner_payout; totalFee += s.platform_fee;
    }
    return `
    <tr data-report-id="${r.id}">
      <td>#${r.id} ${r.title}</td>
      <td>${partnersById[r.assigned_partner_id] || '-'}</td>
      <td>${r.plan_type || '-'}</td>
      <td><input type="number" class="amount-input" value="${defaultAmount}" style="width:90px;"></td>
      <td><input type="number" class="payout-input" value="${defaultPayout}" style="width:90px;"></td>
      <td class="fee-display">${fee.toLocaleString()}원</td>
      <td>
        <input type="checkbox" class="paid-check" ${s && s.paid ? 'checked' : ''}>
        <button class="btn save-settlement" style="padding:4px 8px; font-size:11px; margin-left:4px;">저장</button>
      </td>
    </tr>
  `}).join('');

  summaryEl.textContent = `정산완료 기준 · 총 결제액 ${totalAmount.toLocaleString()}원 · 파트너 지급 ${totalPayout.toLocaleString()}원 · 플랫폼 수익 ${totalFee.toLocaleString()}원`;

  document.querySelectorAll('#settlementsBody tr').forEach(tr=>{
    const amountInput = tr.querySelector('.amount-input');
    const payoutInput = tr.querySelector('.payout-input');
    const feeDisplay = tr.querySelector('.fee-display');
    const recalc = () => {
      const fee = (Number(amountInput.value)||0) - (Number(payoutInput.value)||0);
      feeDisplay.textContent = fee.toLocaleString() + '원';
    };
    amountInput.addEventListener('input', recalc);
    payoutInput.addEventListener('input', recalc);

    tr.querySelector('.save-settlement').addEventListener('click', async ()=>{
      const reportId = Number(tr.dataset.reportId);
      const report = reports.find(r=>r.id===reportId);
      const paid = tr.querySelector('.paid-check').checked;
      const { error } = await supabaseClient.from('settlements').upsert({
        report_id: reportId,
        partner_id: report.assigned_partner_id,
        plan_type: report.plan_type,
        total_amount: Number(amountInput.value)||0,
        partner_payout: Number(payoutInput.value)||0,
        paid: paid,
        paid_at: paid ? new Date().toISOString() : null,
        updated_at: new Date().toISOString()
      }, { onConflict: 'report_id' });
      if(error){ alert('저장 실패: ' + error.message); return; }
      loadSettlements();
    });
  });
}

checkSession();
</script>
</body>
</html>
