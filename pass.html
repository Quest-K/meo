<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암구호 랜덤 생성기</title>
    <style>
        /* 웹페이지 기본 스타일 설정 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f6fa;
        }
        /* 암구호가 표시될 카드 박스 스타일 */
        .container {
            text-align: center;
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        /* 랜덤으로 노출될 단어의 강조 스타일 */
        .word-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: #2e86de;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        /* 다른 단어를 볼 수 있는 버튼 스타일 */
        .refresh-btn {
            background-color: #2e86de;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .refresh-btn:hover {
            background-color: #1a5276;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>오늘의 암구호</h1>
        <!-- JavaScript를 통해 랜덤 단어가 삽입될 구역 -->
        <div id="passwordWord" class="word-display">로드 중...</div>
        <!-- 클릭 시 새로운 단어를 뽑아주는 버튼 -->
        <button class="refresh-btn" onclick="showRandomWord()">새로고침</button>
    </div>

    <script>
        // 암구호로 쓰기 좋은 순우리말 2글자, 3글자 단어 총 100개 리스트
        const koreanWords = [
            // --- 2글자 순우리말 (50개) ---
            "가람", "나래", "다솜", "라온", "마루", "바람", "아라", "시나", "미르", "그린",
            "도담", "새론", "온누", "하람", "모아", "노을", "윤슬", "꼬두", "벼리", "혜윰",
            "소미", "다은", "이솔", "늘봄", "새솔", "한울", "나봄", "도란", "든해", "소아",
            "잔디", "하늬", "단미", "토리", "보늬", "새나", "하나", "누리", "가온", "로다",
            "티나", "솔찬", "소담", "달래", "다올", "나린", "슬아", "수피", "아사", "우솔",

            // --- 3글자 순우리말 (50개) ---
            "미리내", "도란도", "시나브", "다소니", "아스라", "안다미", "하제나", "바라봄", "새하마", "한내글",
            "푸르내", "보람찬", "가람휘", "나르샤", "가온길", "꽃가람", "늘해랑", "다솔길", "도담도", "마루한",
            "벼리마", "새슬아", "소담한", "온누리", "하람빛", "한빛가", "흰가람", "그린나", "길가온", "꽃내음",
            "나래울", "다사롬", "든솔길", "마루치", "별하랑", "새론길", "소아름", "아리아", "오롯이", "우람찬",
            "으뜸이", "찬누리", "하늬바", "한가람", "한울타", "해오름", "희나리", "늘솔길", "다사로", "새물결"
        ];

        // 100개의 단어 중 하나를 무작위로 선택하여 화면에 노출하는 함수
        function showRandomWord() {
            // 0부터 99까지의 랜덤한 정수(인덱스) 생성
            const randomIndex = Math.floor(Math.random() * koreanWords.length);
            
            // 선택된 인덱스의 단어를 가져옴
            const selectedWord = koreanWords[randomIndex];
            
            // HTML 문서 내의 'passwordWord' 요소를 찾아 단어를 변경함
            document.getElementById("passwordWord").innerText = selectedWord;
        }

        // 웹사이트가 처음 로드될 때 자동으로 함수를 실행하여 첫 화면에 단어가 보이도록 설정
        window.onload = showRandomWord;
    </script>
</body>
</html>
