<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보안 암구호 시스템 (완전 랜덤)</title>
    <style>
        /* 웹페이지 기본 스타일 설정 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1e272e; /* 보안 테마 어두운 배경 */
            color: #ffffff;
        }
        /* 암구호 세트가 표시될 카드 박스 스타일 */
        .container {
            text-align: center;
            background: #2f3640;
            padding: 50px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            min-width: 450px;
        }
        h1 {
            color: #fbc531; /* 경고/보안을 상징하는 황색 포인트 */
            font-size: 1.4rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        /* 문어와 답어를 배치하는 그리드 레이아웃 */
        .code-zone {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 20px;
        }
        /* 개별 암구호(문어/답어) 상자 스타일 */
        .code-box {
            flex: 1;
            background: #353b48;
            padding: 25px 20px;
            border-radius: 10px;
            border: 1px solid #718093;
        }
        .code-label {
            font-size: 0.9rem;
            color: #a4b0be;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .code-word {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d2d3; /* 부각되는 민트색 적용 */
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .code-meaning {
            font-size: 0.9rem;
            color: #dcdde1;
            line-height: 1.4;
        }
        /* 다른 암구호 세트를 생성하는 버튼 스타일 */
        .refresh-btn {
            background-color: #fbc531;
            color: #2f3640;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .refresh-btn:hover {
            background-color: #e1b12c;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>오늘의 완전 랜덤 암구호</h1>
        
        <div class="code-zone">
            <div class="code-box">
                <div class="code-label">문어 (問語) - 2글자</div>
                <div id="questionWord" class="code-word">로드 중...</div>
                <div id="questionMeaning" class="code-meaning"></div>
            </div>
            
            <div class="code-box">
                <div class="code-label">답어 (答語) - 3글자</div>
                <div id="answerWord" class="code-word">로드 중...</div>
                <div id="answerMeaning" class="code-meaning"></div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="generateTrueRandomCrypto()">암구호 갱신</button>
    </div>

            { word: "바람", meaning: "원하는 대로 이루어지기를 바라는 마음" },

            { word: "노을", meaning: "해가 뜨거나 질 때 하늘이 붉게 물드는 현상" },
            { word: "윤슬", meaning: "햇빛이나 달빛에 비치어 반짝이는 잔물결" },
            { word: "꼬두", meaning: "꼭대기, 가장 높은 곳의 옛말 방언" },

        // 답어로 사용될 3글자 순우리말 독립 데이터 (50개)

            { word: "하제나", meaning: "내일(하제)처럼 다가올 희망" },

            { word: "새하마", meaning: "새얗고 맑은 마음" },
            { word: "한내글", meaning: "큰 시내처럼 끝없이 흐르는 글" },
            { word: "푸르내", meaning: "맑고 푸른 물이 흐르는 시내" },
            { word: "보람찬", meaning: "보람이 가득하여 마음에 뿌듯함" },
            { word: "가람휘", meaning: "강(가람)과 휘(넓은 벌판)의 조합" },
            { word: "나르샤", meaning: "날아오르다의 옛말" },
            { word: "가온길", meaning: "정직하고 바른 가운데(중심) 길" },
            { word: "꽃가람", meaning: "꽃이 핀 강가" },
            { word: "늘해랑", meaning: "늘 해와 함께 살아가는 밝은 사람" },
            { word: "다솔길", meaning: "어린 소나무들이 곧게 자란 길" },
            { word: "도담도", meaning: "어린아이가 아무 탈 없이 자라는 모양" },
            { word: "마루한", meaning: "으뜸가는 리더, 최고의 우두머리" },
            { word: "벼리마", meaning: "중심이 되는 일의 뼈대와 마음" },
            { word: "새슬아", meaning: "새롭고 슬기로우며 아름다운" },
            { word: "소담한", meaning: "생김새가 탐스럽고 풍성한" },
            { word: "온누리", meaning: "온 세상 전체를 뜻하는 말" },
            { word: "하람빛", meaning: "하늘이 내린 소중한 사람의 빛" },
            { word: "한빛가", meaning: "세상을 이끄는 환하고 큰 빛" },
            { word: "흰가람", meaning: "맑고 깨끗하게 흐르는 강" },
            { word: "그린나", meaning: "그리운 나래, 혹은 꿈을 그리는 나" },
            { word: "길가온", meaning: "길의 한가운데, 올바른 행보" },
            { word: "꽃내음", meaning: "꽃의 향기롭고 은은한 냄새" },
            { word: "나래울", meaning: "날개(나래)가 펼쳐진 큰 울타리" },
            { word: "다사롬", meaning: "따뜻하고 다사로운 상태나 성품" },
            { word: "든솔길", meaning: "든든한 소나무가 늘어선 길" },
            { word: "마루치", meaning: "하늘 혹은 산꼭대기를 뜻하는 소년 영웅" },
            { word: "별하랑", meaning: "별처럼 높고 빛나는 사람이 되어 함께하다" },

            { word: "아리아", meaning: "요정이나 고운 사람을 부르는 우리말 소리" },

            { word: "찬누리", meaning: "복이 가득 찬 온 세상" },
            { word: "하늬바", meaning: "농가나 어촌에서 서풍을 이르는 말" },
            { word: "한가람", meaning: "크고 넓은 한강과 같은 강" },
            { word: "한울타", meaning: "우주만큼 큰 한 울타리" },
            { word: "해오름", meaning: "해가 산이나 바다 위로 힘차게 떠오름" },
            { word: "희나리", meaning: "덜 마른 장작, 혹은 가공하지 않은 순수함" },
            { word: "늘솔길", meaning: "언제나 솔바람이 부는 상쾌한 길" },
            { word: "다사로", meaning: "날씨나 성품이 매우 다사롭고 따뜻함" },

        // 문어 풀과 답어 풀에서 완전히 독립적으로 랜덤하게 추출하여 매칭하는 함수
        function generateTrueRandomCrypto() {
            // 0~49 인덱스 중 문어용 랜덤 인덱스 추출
            const randomQIndex = Math.floor(Math.random() * questionPool.length);
            // 0~49 인덱스 중 답어용 랜덤 인덱스 추출 (완전 독립 시행)
            const randomAIndex = Math.floor(Math.random() * answerPool.length);
            
            const selectedQ = questionPool[randomQIndex];
            const selectedA = answerPool[randomAIndex];
            
            // 문어 영역 화면 업데이트
            document.getElementById("questionWord").innerText = selectedQ.word;
            document.getElementById("questionMeaning").innerText = selectedQ.meaning;
            
            // 답어 영역 화면 업데이트
            document.getElementById("answerWord").innerText = selectedA.word;
            document.getElementById("answerMeaning").innerText = selectedA.meaning;
        }

</body>
</html>
